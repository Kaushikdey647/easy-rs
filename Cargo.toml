[package]
name = "easy-rs"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-or-later"

[dependencies]
apca = { version = "0.30", path = "../apca" }
orderbook-rs = { version = "0.6.1", path = "../OrderBook-rs" }
pricelevel = "0.7"
chrono = "0.4"
crossbeam-queue = { version = "0.3", default-features = false }
futures = { version = "0.3", default-features = false, features = ["std"] }
num-decimal = { version = "0.2.4", default-features = false, features = ["num-v04", "serde"] }
polars = { version = "0.51", features = ["lazy", "temporal", "fmt"] }
plotters = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ta = "0.5"
tokio = { version = "1.43", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
